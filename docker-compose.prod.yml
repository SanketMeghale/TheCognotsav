version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: thecogno-portal-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: thecogno_portal
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  app:
    build: .
    container_name: thecogno-portal-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/thecogno_portal
      - PORT=8787
      - ADMIN_ACCESS_KEY=${ADMIN_ACCESS_KEY}
      - SMTP_PROVIDER=${SMTP_PROVIDER}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURE=${SMTP_SECURE}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME}
    ports:
      - "80:8787"
    depends_on:
      - postgres
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge