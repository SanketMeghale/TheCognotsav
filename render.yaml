services:
  - type: web
    name: thecognotsav-web
    runtime: node
    plan: free
    autoDeploy: true
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: thecognotsav-db
          property: connectionString
      - key: ADMIN_ACCESS_KEY
        sync: false
      - key: STORAGE_ROOT
        value: /tmp/thecognotsav-data
      - key: SMTP_PROVIDER
        value: gmail
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_SECURE
        value: "true"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_NAME
        value: CEAS COGNOTSAV

databases:
  - name: thecognotsav-db
    databaseName: thecognotsav
    user: thecognotsav
    plan: free
